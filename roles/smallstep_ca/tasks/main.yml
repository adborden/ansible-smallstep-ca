---
- name: Create smallstep group
  ansible.builtin.group:
    name: "{{ smallstep_ca_group }}"
    system: true

- name: Create smallstep user
  ansible.builtin.user:
    name: "{{ smallstep_ca_user }}"
    group: "{{ smallstep_ca_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Get smallstep user info
  ansible.builtin.getent:
    database: passwd
    key: "{{ smallstep_ca_user }}"

- name: Get smallstep group info
  ansible.builtin.getent:
    database: group
    key: "{{ smallstep_ca_group }}"

- name: Ensure data directory exists
  ansible.builtin.file:
    path: "{{ smallstep_ca_data_dir }}"
    state: directory
    owner: "{{ smallstep_ca_user }}"
    group: "{{ smallstep_ca_group }}"
    mode: "0750"

- name: Create systemd container directory
  ansible.builtin.file:
    path: "{{ smallstep_ca_systemd_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy smallstep-ca container file
  ansible.builtin.template:
    src: smallstep-ca.container.j2
    dest: "{{ smallstep_ca_systemd_dir }}/{{ smallstep_ca_service_name }}.container"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure smallstep-ca service is started and enabled
  ansible.builtin.systemd:
    name: "{{ smallstep_ca_service_name }}"
    state: started
    enabled: true
  tags:
    - molecule-notest
