---
- name: Ensure data directory exists
  ansible.builtin.file:
    path: "{{ smallstep_ca_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create systemd container directory
  ansible.builtin.file:
    path: "{{ smallstep_ca_systemd_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy smallstep-ca container file
  ansible.builtin.template:
    src: smallstep-ca.container.j2
    dest: "{{ smallstep_ca_systemd_dir }}/{{ smallstep_ca_service_name }}.container"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart smallstep-ca

- name: Ensure smallstep-ca service is started and enabled
  ansible.builtin.systemd:
    name: "{{ smallstep_ca_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
  tags:
    - molecule-notest
